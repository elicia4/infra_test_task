services:
  db:
    image: mysql:8.0
    # https://dev.mysql.com/doc/refman/8.4/en/identifier-case-sensitivity.html
    command: --lower-case-table-names=1 
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE:      full-stack-ecommerce
      MYSQL_USER:          user
      MYSQL_PASSWORD:      pass
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/sql-resources:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "user",
             "-ppass"]
      interval: 10s
      timeout:  5s
      retries:  10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend/spring-boot-ecommerce
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/full-stack-ecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8090:8090"
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/angular-ecommerce
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    networks:
      - app-net
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  db_data:

networks:
  app-net:
