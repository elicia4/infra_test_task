---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Allow ports 222, 8000, 9100
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "222"
    - "8000"
    - "9100"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
