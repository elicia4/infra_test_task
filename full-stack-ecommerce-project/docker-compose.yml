services:
  db:
    image: mysql:8.0
    container_name: ecommerce-db
    command: --lower-case-table-names=1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-full-stack-ecommerce}
      MYSQL_USER:          ${MYSQL_USER:-ecomuser}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-ecompassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/sql-resources:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "${MYSQL_USER:-ecomuser}",
             "-p${MYSQL_PASSWORD:-ecompassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ecommerce-net

  backend:
    build:
      context: ./backend/spring-boot-ecommerce
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL:      jdbc:mysql://db:3306/${MYSQL_DATABASE:-full-stack-ecommerce}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-ecomuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-ecompassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommerce-net

  frontend:
    build:
      context: ./frontend/angular-ecommerce
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - ecommerce-net

volumes:
  db_data:
    driver: local

networks:
  ecommerce-net:
    driver: bridge
